<!DOCTYPE html>
<!-- Author: 梦无矶 | 公众号: 梦无矶测开实录 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YuQue Docs</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/one-dark-pro.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/shell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dockerfile.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/nginx.min.js"></script>
    <script>hljs.configure({ignoreUnescapedHTML: true});</script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>YuQue Docs</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索文档内容...">
                <button class="search-clear" id="search-clear">&times;</button>
            </div>
        </div>
        <div id="search-results" class="search-results" style="display:none;"></div>
        <nav id="tree-nav" class="tree-nav"></nav>
    </aside>
    <main class="content">
        <div id="doc-content" class="markdown-body">
            <div class="welcome">
                <h1>YuQue Docs</h1>
                <p class="welcome-author">梦无矶</p>
                <p class="welcome-desc">公众号: 梦无矶测开实录</p>
                <p class="welcome-links">
                    <a href="https://github.com/Lvan826199/YuQueToMD" target="_blank">GitHub</a>
                    <span class="link-sep">|</span>
                    <a href="https://gitee.com/xiaozai-van-liu/YuQueToMD" target="_blank">Gitee</a>
                </p>
                <div class="welcome-features">
                    <h3>功能特性</h3>
                    <ul>
                        <li>语雀 .lakebook 文件批量转换为 Markdown</li>
                        <li>按知识库目录层级生成输出</li>
                        <li>可选下载远程图片到本地</li>
                        <li>本地 Web 服务器浏览文档</li>
                        <li>树形目录导航，中文数字自然排序</li>
                        <li>全文搜索，关键词高亮定位</li>
                        <li>右侧文档大纲，滚动自动高亮</li>
                        <li>代码块深色主题 + 语法高亮 + 一键复制</li>
                        <li>实时渲染，新增文件刷新即见</li>
                    </ul>
                </div>
                <p class="welcome-hint">从左侧目录选择文档开始阅读，或使用搜索框查找内容。</p>
            </div>
        </div>
    </main>
    <aside class="outline-panel" id="outline-panel">
        <div class="outline-resize-handle" id="outline-resize-handle"></div>
        <div class="outline-header">大纲</div>
        <nav id="outline-nav" class="outline-nav"></nav>
    </aside>
    <script src="/static/app.js"></script>
</body>
</html>
